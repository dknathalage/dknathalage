inputs:
  SERVICE_NAME:
    required: true
  DOCKERFILE:
    required: true
  GCP_CTX_SERVICE_ACCOUNT:
    required: true
    default: "gha-ci-sa@dknathalage.iam.gserviceaccount.com"
  GCP_CTX_ID_PROVIDER:
    required: true
    default: "projects/719430876063/locations/global/workloadIdentityPools/dknathalage-identity-pool/providers/dknathalage-id-provider"
  GCP_CTX_GAR_REGISTRY:
    required: true
    default: "australia-southeast2-docker.pkg.dev"
  GCP_CTX_GAR_REPOSITORY:
    required: true
    default: "dknathalage/dknathalage"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - id: auth
      uses: google-github-actions/auth@v1
      with:
        token_format: "access_token"
        workload_identity_provider: ${{ inputs.GCP_CTX_ID_PROVIDER }}
        service_account: ${{ inputs.GCP_CTX_SERVICE_ACCOUNT }}
        access_token_lifetime: "300s"
    - uses: docker/login-action@v2
      with:
        registry: ${{ inputs.GCP_CTX_GAR_REGISTRY }}
        username: "oauth2accesstoken"
        password: ${{ steps.auth.outputs.access_token }}
    - id: image_base
      shell: bash
      run: echo "IMAGE_BASE=${{ inputs.GCP_CTX_GAR_REGISTRY }}/${{ inputs.GCP_CTX_GAR_REPOSITORY }}/${{ inputs.SERVICE_NAME }} >> $GITHUB_OUTPUT
    - uses: docker/build-push-action@v6
      with:
        push: true
        tags: |
          ${{ steps.image_base.outputs.IMAGE_BASE }}:latest
          ${{ steps.image_base.outputs.IMAGE_BASE }}:${{ github.sha }}
        file: ${{ inputs.DOCKERFILE }}
        context: .
        cache-from: type=registry,ref=${{ steps.image_base.outputs.IMAGE_BASE }}:buildcache
        cache-to: type=registry,ref=${{ steps.image_base.outputs.IMAGE_BASE }}:buildcache
