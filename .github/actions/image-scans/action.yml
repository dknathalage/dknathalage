name: image-scans

inputs:
  image-name:
    description: "Image name to scan"
    required: true

  image-tag:
    description: "The image tag to scan"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - id: auth
      uses: google-github-actions/auth@v2
      with:
        token_format: access_token
        workload_identity_provider: projects/719430876063/locations/global/workloadIdentityPools/dknathalage-identity-pool/providers/dknathalage-id-provider
        service_account: gha-ci-sa@dknathalage.iam.gserviceaccount.com
        access_token_lifetime: 300s

    - uses: docker/login-action@v1
      with:
        registry: australia-southeast2-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: ${{ inputs.image-name }}:${{ inputs.image-tag }}
        vuln-type: "os,library"
        severity: "LOW,MEDIUM,HIGH,CRITICAL"
        format: "sarif"
        output: "trivy-results-${{ inputs.image-name }}.sarif"
      env:
        TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
      id: trivy

    - uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: "trivy-results-${{ inputs.image-name }}.sarif"
        category: trivy
