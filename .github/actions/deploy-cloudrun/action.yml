name: Deploy Cloudrun 🚀🏃

inputs:
  workload_idp:
    type: string
    required: true
    description: "Workload Identity Provider for GCP"
  service_account:
    type: string
    required: true
    description: "Service Account for deployment"
  service_name:
    type: string
    required: true
    description: "Service Name for deployment"
  region:
    type: string
    required: true
    description: "Region for deployment"
  cpu:
    type: string
    required: false
    description: "CPU for deployment"
    default: "1000m"
  memory:
    type: string
    required: false
    description: "Memory for deployment"
    default: "256Mi"
  image:
    type: string
    required: true
    description: "Image for deployment"
  tag:
    type: string
    required: true
    description: "Tag for deployment"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - id: auth
      uses: google-github-actions/auth@v1
      with:
        token_format: "access_token"
        workload_identity_provider: ${{ inputs.workload_idp }}
        service_account: ${{ inputs.service_account }}
        access_token_lifetime: "300s"

    - uses: google-github-actions/setup-gcloud@v0.2.0
      with:
        version: "latest"

    - id: check-service
      run: |
        if gcloud run services describe ${{ inputs.service_name }} --platform managed --region ${{ inputs.region }}
        then
          echo EXISTS=true >> $GITHUB_OUTPUT
        else
          echo EXISTS=false >> $GITHUB_OUTPUT
        fi
      shell: bash

    - id: "deploy"
      uses: "google-github-actions/deploy-cloudrun@v2"
      with:
        service: ${{ inputs.service_name }}
        image: ${{ inputs.image }}
        tag: ${{ inputs.tag }}
        region: ${{ inputs.region }}
        flags: "--platform=managed --cpu=${{ inputs.cpu }} --memory=${{ inputs.memory }} --allow-unauthenticated --no-traffic=${{ steps.check-service.outputs.EXISTS }}"
