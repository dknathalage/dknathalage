on:
  workflow_dispatch:
    inputs:
      dockerfile:
        description: "Path to the Dockerfile"
      idp:
        description: "Workload Identity Provider"
      sa:
        description: "Service Account"
      region:
        description: "Region"
      project:
        description: "Project"
      repository:
        description: "Repository"
      service:
        description: "Service"
      tag:
        description: "Tag"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ inputs.idp }}
          service_account: ${{ inputs.sa }}
          access_token_lifetime: 300s
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.region }}.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - shell: bash
        run: |
          docker build \
            -t ${{ inputs.region }}.pkg.dev/${{ inputs.project }}/${{ inputs.repository }}/${{ inputs.service }}:${{ inputs.tag }} \
            -f ${{ inputs.dockerfile }} .
      - run: docker push ${{ inputs.region }}.pkg.dev/${{ inputs.project }}/${{ inputs.repository }}/${{ inputs.service }}:${{ inputs.tag }}
