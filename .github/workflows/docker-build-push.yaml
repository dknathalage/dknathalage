on:
  workflow_call:
    inputs:
      dockerfile:
        type: string
        description: "Path to the Dockerfile"
      idp:
        type: string
        description: "Workload Identity Provider"
      sa:
        type: string
        description: "Service Account"
      region:
        type: string
        description: "Region"
      project:
        type: string
        description: "Project"
      repository:
        type: string
        description: "Repository"
      service:
        type: string
        description: "Service"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ inputs.idp }}
          service_account: ${{ inputs.sa }}
          access_token_lifetime: 300s
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.region }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - shell: bash
        run: |
          docker build \
            -t ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project }}/${{ inputs.repository }}/${{ inputs.service }}:${{ github.sha }} \
            -f ${{ inputs.dockerfile }} .
      - run: docker push ${{ inputs.region }}-docker.pkg.dev/${{ inputs.project }}/${{ inputs.repository }}/${{ inputs.service }}:${{ github.sha }}
