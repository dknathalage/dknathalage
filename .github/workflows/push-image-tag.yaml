name: Docker Push Tag Workflow 🐳
on:
  workflow_dispatch:
    inputs:
      source_image_name:
        description: "Name of the Docker image"
        required: true
      source_image_tag:
        description: "Tag of the Docker image"
        required: true
      new_image_tag:
        description: "Tag of the Docker image"
        required: true
      workload_identity_provider:
        description: "Workload Identity Pool Provider for Google Artifact Registry"
        default: projects/719430876063/locations/global/workloadIdentityPools/dknathalage-identity-pool/providers/dknathalage-id-provider
      service_account:
        description: "Service Account for Google Artifact Registry"
        default: gha-ci-sa@dknathalage.iam.gserviceaccount.com
      registry:
        description: "Google Artifact Registry"
        default: australia-southeast2-docker.pkg.dev

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4

      - name: Set up Docker Buildx 🏗️
        uses: docker/setup-buildx-action@v2

      - name: Login to Google Artifact Registry 🛅
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ github.event.inputs.workload_identity_provider }}
          service_account: ${{ github.event.inputs.service_account }}
          access_token_lifetime: "300s"

      - name: Login to Docker 🐳
        uses: docker/login-action@v3
        with:
          registry: ${{ github.event.inputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Pull, Tag and Push Docker Image 🐳
        run: |
          docker pull ${{ github.event.inputs.source_image_name }}:${{ github.event.inputs.source_image_tag }}
          docker tag ${{ github.event.inputs.source_image_name }}:${{ github.event.inputs.source_image_tag }} ${{ github.event.inputs.source_image_name }}:${{ github.event.inputs.new_image_tag }}
          docker push ${{ github.event.inputs.source_image_name }}:${{ github.event.inputs.new_image_tag }}
