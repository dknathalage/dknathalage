name: Docker Build Workflow 🐳
on:
  workflow_call:
    inputs:
      image_name:
        description: Name of the Docker image
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile
        required: true
        type: string
      image_tag:
        description: Tag of the Docker image
        default: latest
        type: string
      workload_identity_provider:
        description: Workload Identity Pool Provider for Google Artifact Registry
        default: projects/719430876063/locations/global/workloadIdentityPools/dknathalage-identity-pool/providers/dknathalage-id-provider
        type: string
      service_account:
        description: Service Account for Google Artifact Registry
        default: gha-ci-sa@dknathalage.iam.gserviceaccount.com
        type: string
      registry:
        description: Google Artifact Registry
        default: australia-southeast2-docker.pkg.dev
        type: string
      push_image:
        description: Push the Docker image
        type: boolean
        default: true
      scan_image:
        description: Scan the Docker image
        type: boolean
        default: true
      scan_severity:
        description: Trivy Severity
        default: CRITICAL,HIGH,MEDIUM
        type: string

jobs:
  build:
    name: ${{ inputs.image_name }} Build 🏗️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4

      - name: Set up Docker Buildx 🏗️
        uses: docker/setup-buildx-action@v3

      - name: Login to Google Artifact Registry 🛅
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}
          access_token_lifetime: 300s

      - name: Login to Docker 🐳
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build Docker Image 🐳
        shell: bash
        run: |
          docker build \
            -t ${{ inputs.image_name }}:${{ inputs.image_tag }} \
            -t ${{ inputs.image_name }}:${{ github.sha }} \
            -f ${{ inputs.dockerfile }} .

      - name: Push Docker Image 🚀
        if: ${{ inputs.push_image }}
        run: |
          docker push ${{ inputs.image_name }}:${{ inputs.image_tag }}
          rm -rf ./reports && mkdir -p ./reports

      - name: Scan Docker Image 🕵
        if: ${{ inputs.scan_image }}
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        id: trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          exit-code: 1
          format: table
          ignore-unfixed: true
          image-ref: ${{ inputs.image_name }}:${{ github.sha }}
          severity: ${{ inputs.scan_severity }}
          vuln-type: os,library
          output: ./reports/trivy-report.txt

      - name: Output step summary
        run: |
          echo "**Trivy Config Scan Summary**" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat ./reports/trivy-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
