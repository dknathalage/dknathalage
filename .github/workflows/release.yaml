name: Release 🚛

on:
  push:
    tags:
      - "*"

jobs:
  prerelease: # runs on tags like v1.0.0-1
    if: ${{ contains(github.event.ref, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: last_release
        uses: InsonusK/get-latest-release@v1.0.1
        with:
          myToken: ${{ github.token }}
          view_top: 1

      - if: ${{ steps.last_release.outputs.prerelease == 'true' }}
        run: |
          gh release delete ${{ steps.last_release.outputs.tag_name }}

      - run: |
          gh release create ${{ github.event.ref }} \
            --title "Pre-release ${{ github.event.ref }}" \
            --notes "Pre-release ${{ github.event.ref }}" \
            --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}

  releases: # runs on tags like v1.0.0
    if: ${{ !contains(github.event.ref, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: last_release
        uses: InsonusK/get-latest-release@v1.0.1
        with:
          myToken: ${{ github.token }}
          view_top: 1

      - if: ${{ steps.last_release.outputs.prerelease == 'true' }}
        run: |
          gh release delete ${{ steps.last_release.outputs.tag_name }}

      - run: |
          gh release create ${{ github.event.ref }} \
            --title "Release ${{ github.event.ref }}" \
            --notes "Release ${{ github.event.ref }}"
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
