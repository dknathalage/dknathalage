name: Release Workflow

on:
  # Trigger the workflow when pushing to the main branch
  push:
    branches:
      - main

  # Manual trigger for official releases
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16" # Adjust to your Node.js version

      # Step 3: Install release-it globally
      - name: Install release-it
        run: npm install -g release-it

      # Step 4: Determine the version bump type
      - name: Determine Version Bump
        id: version_bump
        run: |
          # Get the commit message of the latest commit
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # Default bump type is 'prerelease'
          BUMP_TYPE="prerelease"

          # Check for keywords in the commit message to determine the bump type
          if [[ "$COMMIT_MSG" == *"[major]"* ]]; then
            BUMP_TYPE="major"
          elif [[ "$COMMIT_MSG" == *"[minor]"* ]]; then
            BUMP_TYPE="minor"
          elif [[ "$COMMIT_MSG" == *"[patch]"* ]]; then
            BUMP_TYPE="patch"
          elif [[ "$COMMIT_MSG" == *"[rc]"* ]]; then
            BUMP_TYPE="prerelease"
            PRE_RELEASE_ID="rc"
          fi

          echo "Version bump type: $BUMP_TYPE"
          echo "Pre-release ID: $PRE_RELEASE_ID"
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "pre_release_id=$PRE_RELEASE_ID" >> $GITHUB_OUTPUT

      # Step 5: Run release-it to create tags and releases
      - name: Run release-it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine if it's a manual release or automatic pre-release
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual release
            release-it ${{ steps.version_bump.outputs.bump_type }} --ci --git.tagName='v${version}' --github.release --github.token=${GITHUB_TOKEN}
          else
            # Automatic pre-release
            if [ "${{ steps.version_bump.outputs.bump_type }}" == "prerelease" ]; then
              release-it ${{ steps.version_bump.outputs.bump_type }} --preReleaseId=${{ steps.version_bump.outputs.pre_release_id }} --ci --git.tagName='v${version}' --github.release --github.preRelease --github.token=${GITHUB_TOKEN}
            else
              # For regular commits without [rc], no release is made
              echo "No release created as the commit does not contain [rc]"
            fi
          fi
