name: Release

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: release
        uses: ncipollo/release-action@v1.14.0
        with:
          allowUpdates: true
          body: Changelog Contents
          token: ${{ github.token }}