on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yaml
      - modules/**

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.23

      - run: |
          go run ./modules/semver/cmd/main.go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
