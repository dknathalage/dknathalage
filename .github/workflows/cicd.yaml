name: CI/CD Pipeline

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  WORKLOAD_IDP: projects/719430876063/locations/global/workloadIdentityPools/id-pool/providers/github-actions
  CI_SA: gha-ci-sa@dknathalage.iam.gserviceaccount.com
  GAR_REGISTRY: australia-southeast2-docker.pkg.dev
  IMAGE_PREFIX: australia-southeast2-docker.pkg.dev/dknathalage/dknathalage
  REGION: australia-southeast2
  CLOUDRUN_FLAGS: ""

jobs:
  unit-test:
    name: Unit Test 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4

      - name: Set up Go 🐹
        uses: actions/setup-go@v5
        with:
          go-version: 1.23

      - name: Install Task 📦
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - name: Run Unit Tests 🧪
        run: task test.setup test.unit

      - name: Unit Test Report 📊
        run: |
          cat ./reports/test_report.md >> $GITHUB_STEP_SUMMARY

      - name: GolangCI-Lint 📦
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60

  docker-push:
    uses: ./.github/workflows/docker-build-push.yaml
    with:
      dockerfile: ./config/docker/invoice.Dockerfile
      idp: projects/719430876063/locations/global/workloadIdentityPools/id-pool/providers/github-actions
      sa: gha-ci-sa@dknathalage.iam.gserviceaccount.com
      region: australia-southeast1
      project: dknathalage
      repository: dknathalage
      service: invoice

