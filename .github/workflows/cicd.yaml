name: CI/CD Pipeline

on:
  push:
    paths:
      - modules/**

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  quality:
    uses: ./.github/workflows/go-quality.yaml

  invoice:
    needs:
      - quality
    uses: ./.github/workflows/cloudrun.yaml
    with:
      service: invoice
      dockerfile: ./config/docker/invoice.Dockerfile
