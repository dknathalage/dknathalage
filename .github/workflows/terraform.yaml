name: Terraform 🏗

on:
  push:
    paths:
      - infra/**
      - .github/workflows/terraform.yaml

env:
  WORKLOAD_IDP: projects/719430876063/locations/global/workloadIdentityPools/id-pool/providers/github-actions
  CI_SA: gha-ci-sa@dknathalage.iam.gserviceaccount.com

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  tf-services:
    needs: tf-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v1
      - uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDP }}
          service_account: ${{ env.CI_SA }}
          access_token_lifetime: 300s
      - run: terraform -chdir=./infra/services init
      - run: terraform -chdir=./infra/services plan
      - run: terraform -chdir=./infra/services apply --auto-approve
      - continue-on-error: false
        id: commit-tf-gen
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git checkout -b tf-gen
          git add .github/workflows/*.yml
          git commit -m "Automated Terraform changes"
          git push -u origin terraform-changes
      - uses: peter-evans/create-pull-request@v5
        if: steps.commit-tf-gen.outcome == 'success'
        with:
          branch: terraform-changes
          title: "Automated Terraform Changes"
          body: |
            This PR includes automated changes generated by Terraform.

  tf-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v1
      - uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDP }}
          service_account: ${{ env.CI_SA }}
          access_token_lifetime: 300s
      - run: terraform -chdir=./infra/shared init
      - run: terraform -chdir=./infra/shared plan
      - run: terraform -chdir=./infra/shared apply --auto-approve
