name: Terraform 🏗

on:
  push:
    paths:
      - infra/**
      - .github/workflows/terraform.yaml
  release:
    types:
      - published

env:
  WORKLOAD_IDP: projects/719430876063/locations/global/workloadIdentityPools/id-pool/providers/github-actions
  CI_SA: gha-ci-sa@dknathalage.iam.gserviceaccount.com

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  plan-apply:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        module:
          - folder: shared
            tfvars: shared.tfvars
          - folder: environment
            tfvars: dev.tfvars
          - folder: environment
            tfvars: np.tfvars
          - folder: environment
            tfvars: prod.tfvars
    uses: ./.github/workflows/terraform-plan-apply.yaml
    with:
      workload_idp: ${{ env.WORKLOAD_IDP }}
      ci_sa: ${{ env.CI_SA }}
      folder: ${{ matrix.module.folder }}
      tfvars: ${{ matrix.module.tfvars }}
