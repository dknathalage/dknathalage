name: Terraform 🏗

on:
  push:
    paths:
      - infra/**
      - .github/workflows/terraform.yaml
      - .github/workflows/terraform-plan-apply.yaml
  release:
    types:
      - published

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  dev-tf:
    uses: dknathalage/dknathalage/.github/workflows/terraform-plan-apply.yaml@main
    with:
      workload_idp: projects/719430876063/locations/global/workloadIdentityPools/id-pool/providers/github-actions
      ci_sa: gha-ci-sa@dknathalage.iam.gserviceaccount.com
      tfvars: dev.tfvars
      environment: dev
      folder: infra
  np-tf:
    needs: dev-tf
    uses: dknathalage/dknathalage/.github/workflows/terraform-plan-apply.yaml@main
    with:
      workload_idp: projects/719430876063/locations/global/workloadIdentityPools/id-pool/providers/github-actions
      ci_sa: gha-ci-sa@dknathalage.iam.gserviceaccount.com
      tfvars: np.tfvars
      environment: np
      folder: infra
  prod-tf:
    needs: np-tf
    uses: dknathalage/dknathalage/.github/workflows/terraform-plan-apply.yaml@main
    with:
      workload_idp: projects/719430876063/locations/global/workloadIdentityPools/id-pool/providers/github-actions
      ci_sa: gha-ci-sa@dknathalage.iam.gserviceaccount.com
      tfvars: prod.tfvars
      environment: prod
      folder: infra
