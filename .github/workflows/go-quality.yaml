on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version"

jobs:
  unit-test:
    name: Unit Test 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4

      - name: Set up Go 🐹
        uses: actions/setup-go@v2
        with:
          go-version: 1.23

      - name: Install Task 📦
        run: curl -sL https://taskfile.dev/install.sh | sh

      - name: Run Unit Tests 🧪
        run: task test.unit
