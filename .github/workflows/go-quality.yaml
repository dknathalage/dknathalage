name: Go Quality Checks 🔎

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: "1.23"

      golint-version:
        type: string
        default: v1.61.0

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    environment: nonproduction
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ inputs.go-version }}

      - name: Module tidy
        run: go mod tidy

      - name: Module download
        run: go mod download

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec ./...

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin ${{ inputs.golint-version }}

      - name: Run golangci-lint
        run: golangci-lint run --timeout 2m

      - name: Run tests
        run: go test -coverprofile=coverage.out -coverpkg=./pkg ./...

      - name: Coverage
        run: go tool cover -func=coverage.out
