name: Go Quality Workflow 🧪

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release version"
        type: string
      go_version:
        description: "Go version"
        default: "1.23"
        type: string

jobs:
  unit-test:
    name: Unit Test 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4

      - name: Set up Go 🐹
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Install Task 📦
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - name: Run Unit Tests 🧪
        run: task test.setup test.unit

      - run: cat ./reports/test_report.md >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint 🧹
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4

      - name: Set up Go 🐹
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Install GolangCI-Lint 📦
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60
