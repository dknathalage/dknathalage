name: CI Workflow ⚙️

permissions:
  contents: read
  actions: read
  id-token: write

on:
  push:
    branches:
      - main

  release:
    types:
      - published
jobs:
  quality:
    uses: ./.github/workflows/go-quality.yaml

  build:
    uses: ./.github/workflows/build-image.yaml
    with:
      image_name: australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/invoice
      image_tag: latest
      dockerfile: ./config/docker/invoice.Dockerfile
