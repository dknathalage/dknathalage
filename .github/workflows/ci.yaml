name: ci

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v0
        with:
          token_format: access_token
          workload_identity_provider: dknathalage-id-provider
          service_account: gha-ci-sa@dknathalage.iam.gserviceaccount.com
          access_token_lifetime: 300s

      - name: Login to Artifact Registry
        uses: docker/login-action@v1
        with:
          registry: australia-southeast2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: docker-push-tagged
        name: Tag Docker image and push to Google Artifact Registry
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: |
            australia-southeast2-docker.pkg.dev-docker.pkg.dev/dknathalage/dknathalage/${{ matrix.service }}:latest
          build-args: |
            APP_NAME=${{ matrix.service }}
