name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  code-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v2
        with:
          go-version: 1.23
      - uses: golangci/golangci-lint-action@v6
      - run: go mod download
      - run: go test -v ./...
      - uses: gwatts/go-coverage-action@v2
        id: coverage
        with:
          coverage-threshold: 80
      - uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out results.sarif ./..."
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gosec

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: service
            dockerfile: ./cmd/service/Dockerfile

    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v1
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - id: docker-push-tagged
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          tags: |
            registry.fly.io/${{ matrix.service.name }}:${{ github.sha }}
            registry.fly.io/${{ matrix.service.name }}:latest

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    strategy:
      matrix:
        service:
          - name: service
    steps:
      - uses: docker/login-action@v1
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: "registry.fly.io/${{ matrix.service.name }}:${{ github.sha }}"
          vuln-type: "os,library"
          severity: "LOW,MEDIUM,HIGH,CRITICAL"
          format: "sarif"
          output: "trivy-results-${{ matrix.service.name }}.sarif"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        id: trivy
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results-${{ matrix.service.name }}.sarif"
          category: trivy

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    strategy:
      matrix:
        service:
          - name: service
            path: ./cmd/service

    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v1
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl launch --config ${{ matrix.service.path }}/fly.toml --remote-only --image registry.fly.io/${{ matrix.service.name }}:${{ github.sha }} --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
