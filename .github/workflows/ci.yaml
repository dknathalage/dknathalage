name: ci

on:
  push:
    branches:
      - main
    paths:
      - "*.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/*.yaml"

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  code-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v2
        with:
          go-version: 1.23
      - uses: golangci/golangci-lint-action@v6

      - run: go mod download

      - run: go test -v ./...

      - uses: gwatts/go-coverage-action@v2
        id: coverage
        with:
          coverage-threshold: 80

      - uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out results.sarif ./..."

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gosec

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: service
            dockerfile: ./cmd/service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: projects/719430876063/locations/global/workloadIdentityPools/dknathalage-identity-pool/providers/dknathalage-id-provider
          service_account: gha-ci-sa@dknathalage.iam.gserviceaccount.com
          access_token_lifetime: 300s

      - uses: docker/login-action@v1
        with:
          registry: australia-southeast2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: docker-push-tagged
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          # push: false
          tags: |
            australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/${{ matrix.service.name }}:${{ github.sha }}
            australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/${{ matrix.service.name }}:latest

      - uses: docker/login-action@v1
        with:
          registry: australia-southeast2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/${{ matrix.service.name }}:${{ github.sha }}
          vuln-type: "os,library"
          severity: "LOW,MEDIUM,HIGH,CRITICAL"
          format: "sarif"
          output: "trivy-results-${{ matrix.service.name }}.sarif"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        id: trivy

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results-${{ matrix.service.name }}.sarif"
          category: trivy

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    strategy:
      matrix:
        service:
          - name: service
            path: ./cmd/service

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config ${{ matrix.service.path }}/fly.toml --remote-only --image australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/${{ matrix.service.name }}:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
