name: ci

on:
  push:
    branches:
      - main
    paths:
      - "*.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/*.yaml"
      - ".github/actions/**"

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  code-scans:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/go-scans
