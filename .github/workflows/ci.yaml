name: CI Workflow ⚙️

permissions:
  contents: read
  actions: read
  id-token: write

on:
  push:
    branches:
      - main

  release:
    types:
      - published

jobs:
  quality:
    uses: ./.github/workflows/go-quality.yaml

  build:
    strategy:
      fail-fast: false
      matrix:
        service:
          - invoice

    uses: ./.github/workflows/image-push.yaml
    with:
      name: Invoice Service
      image_name: australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/${{ matrix.service }}
      dockerfile: ./config/docker/${{ matrix.service }}.Dockerfile

  finalize-ci:
    runs-on: ubuntu-latest
    needs:
      - build
      - quality
    steps:
      - name: Finalize CI 🏁
        run: echo "CI Completed 🎉"

  deploy:
    needs:
      - finalize-ci
    uses: ./.github/workflows/deploy-cloudrun.yaml
    with:
      image: ${{ matrix.service.name }}
      service: ${{ matrix.service.image }}:latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: invoice
            image: australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/invoice
