name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  code-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v2
        with:
          go-version: 1.23
      - uses: golangci/golangci-lint-action@v6
      - run: go mod download
      - run: go test -v ./...
      - uses: gwatts/go-coverage-action@v2
        id: coverage
        with:
          coverage-threshold: 80
      - uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out results.sarif ./..."
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gosec

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: service
            dockerfile: ./cmd/service/Dockerfile
            fly_toml: ./cmd/service/fly.toml
    steps:
      - name: 👀 Read app name
        uses: SebRollen/toml-action@v1.0.0
        id: app_name
        with:
          file: ${{ matrix.service.fly_toml }}
          field: "app"

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: ⚡️ Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: 🔑 Fly Registry Auth
        uses: docker/login-action@v2
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: 🐳 Docker build
        uses: docker/build-push-action@v3
        with:
          context: ${{ matrix.service.dockerfile }}
          push: true
          tags: registry.fly.io/${{ steps.app_name.outputs.value }}:${{ github.sha }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new

      - name: 🚚 Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: "registry.fly.io/${{ steps.app_name.outputs.value }}:${{ github.sha }}"
          vuln-type: "os,library"
          severity: "LOW,MEDIUM,HIGH,CRITICAL"
          format: "sarif"
          output: "trivy-results-${{ matrix.service.name }}.sarif"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
        id: trivy
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results-${{ matrix.service.name }}.sarif"
          category: trivy

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl launch --config ${{ matrix.service.path }}/fly.toml --remote-only --image registry.fly.io/${{ steps.app_name.outputs.value }}:${{ github.sha }} --app ${{ steps.app_name.outputs.value }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
