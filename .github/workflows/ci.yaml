name: CI Workflow ⚙️

permissions:
  contents: read
  actions: read
  id-token: write

on:
  push:
    branches:
      - main

  release:
    types:
      - published

jobs:
  quality:
    uses: ./.github/workflows/go-quality.yaml

  build:
    uses: ./.github/workflows/image-push.yaml
    with:
      image_name: australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/invoice
      dockerfile: ./config/docker/invoice.Dockerfile

  deploy:
    needs:
      - build
      - quality
    uses: ./.github/workflows/deploy-cloudrun.yaml
    with:
      service: invoice
      image: australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/invoice:latest

  tag-docker:
    needs:
      - deploy
    uses: ./.github/workflows/image-tag.yaml
    with:
      image_name: australia-southeast2-docker.pkg.dev/dknathalage/dknathalage/invoice
      image_current_tag: latest
      image_new_tag: prod
