on:
  workflow_call:
    inputs:
      service:
        type: string
        required: true
      dockerfile:
        type: string
        required: true

env:
  GCP_CTX_SERVICE_ACCOUNT: gha-ci-sa@dknathalage.iam.gserviceaccount.com
  GCP_CTX_ID_PROVIDER: projects/719430876063/locations/global/workloadIdentityPools/dknathalage-identity-pool/providers/dknathalage-id-provider
  GCP_CTX_GAR_REGISTRY: australia-southeast2-docker.pkg.dev
  GCP_CTX_GAR_REPOSITORY: dknathalage/dknathalage

jobs:
  push-images:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: auth
        uses: google-github-actions/auth@v1
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.GCP_CTX_ID_PROVIDER }}
          service_account: ${{ env.GCP_CTX_SERVICE_ACCOUNT }}
          access_token_lifetime: 300s

      - uses: docker/login-action@v2
        with:
          registry: ${{ env.GCP_CTX_GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: image_base
        run: echo IMAGE_BASE=${{ env.GCP_CTX_GAR_REGISTRY }}/${{ env.GCP_CTX_GAR_REPOSITORY }}/${{ inputs.service }} >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ steps.image_base.outputs.IMAGE_BASE }}:latest
            ${{ steps.image_base.outputs.IMAGE_BASE }}:${{ github.sha }}
          file: ${{ inputs.dockerfile }}
          context: .
          cache-from: type=registry,ref=${{ steps.image_base.outputs.IMAGE_BASE }}:buildcache
          cache-to: type=registry,ref=${{ steps.image_base.outputs.IMAGE_BASE }}:buildcache
