on:
  workflow_dispatch:
    inputs:
      source_image:
        description: "Source image"
      destination_image:
        description: "Destination image"
      source_region:
        description: "Source region"
      destination_region:
        description: "Destination region"
      idp:
        description: "Workload Identity Provider"
      sa:
        description: "Service Account"

jobs:
  pull-push:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ inputs.idp }}
          service_account: ${{ inputs.sa }}
          access_token_lifetime: 300s
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.source_region }}.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.destination_region }}.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - run: docker pull ${{ inputs.source_image }}
      - run: docker tag ${{ inputs.source_image }} ${{ inputs.destination_image }}
      - run: docker push ${{ inputs.destination_image }}
