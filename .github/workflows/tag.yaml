name: Tagging 🏷️
# TODO: explore https://github.com/marketplace/actions/update-semantic-version

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}

jobs:
  prerelease:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Repo SemVer
        uses: lhstrh/action-repo-semver@v1.2.1
        id: current-repo-semver

      - name: Create Tag (Pre-release)
        if: ${{ steps.current-repo-semver.outputs.next-release != steps.current-repo-semver.outputs.current }}
        run: |
          new_tag="v${{ steps.current-repo-semver.outputs.next-prerelease }}"
          git tag -a -m "Pre-release $new_tag" $new_tag
          git push origin $new_tag
          gh release delete v${{ steps.current-repo-semver.outputs.current }} || true

          title="Release ${{steps.current-repo-semver.outputs.next-release}}"
          gh release create $new_tag --title $title --prerelease --notes "Release $new_tag"

      - name: Create Tag (Minor)
        if: ${{ steps.current-repo-semver.outputs.next-release == steps.current-repo-semver.outputs.current }}
        run: |
          new_tag="v${{ steps.current-repo-semver.outputs.next-minor }}-0"
          git tag -a -m "Release $new_tag" $new_tag
          git push origin $new_tag
          echo NEW_TAG=$new_tag >> $GITHUB_OUTPUT
          gh release create $new_tag --title "Pre-release $new_tag" --prerelease --notes "Release $new_tag"
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}

  release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Repo SemVer
        uses: lhstrh/action-repo-semver@v1.1.2
        id: repo-semver

      - name: Create Tag
        run: |
          new_tag="v${{ steps.repo-semver.outputs.next-release }}"
          git tag -a -m "Release $new_tag" $new_tag
          git push origin $new_tag
          gh release delete v${{ steps.repo-semver.outputs.current }}
          gh release create $new_tag --title "Release $new_tag" --notes "Release $new_tag"
