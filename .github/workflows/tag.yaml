name: Tagging 🏷️

on:
  push:
    branches:
      - main

  workflow_dispatch:

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
      - labeled

permissions:
  contents: write
  pull-requests: write

jobs:
  prerelease:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Repo SemVer
        uses: lhstrh/action-repo-semver@v1.2.1
        id: current-repo-semver

      - name: Create Tag (Pre-release)
        if: ${{ steps.current-repo-semver.outputs.next-release != steps.current-repo-semver.outputs.current }}
        run: |
          new_tag="v${{ steps.current-repo-semver.outputs.next-prerelease }}"
          git tag -a -m "Pre-release $new_tag" $new_tag
          git push origin $new_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Tag (Minor)
        if: ${{ steps.current-repo-semver.outputs.next-release == steps.current-repo-semver.outputs.current }}
        run: |
          new_tag="v${{ steps.current-repo-semver.outputs.next-minor }}-0"
          git tag -a -m "Release $new_tag" $new_tag
          git push origin $new_tag

  release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Repo SemVer
        uses: lhstrh/action-repo-semver@v1.1.2
        id: repo-semver

      - name: Create Tag
        run: |
          new_tag="v${{ steps.repo-semver.outputs.next-release }}"
          git tag -a -m "Release $new_tag" $new_tag
          git push origin $new_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Repo SemVer
        uses: lhstrh/action-repo-semver@v1.1.2
        id: repo-semver

      - name: Create Tag
        run: |
          new_tag="v${{ steps.repo-semver.outputs.next-build }}"
          git tag -a -m "Release $new_tag" $new_tag
          git push origin $new_tag
