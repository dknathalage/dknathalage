name: CI/CD Pipeline
on:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/ci-vultr-services.yaml"

permissions:
  contents: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: 1.23
      - run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
      - run: task setup.lint
      - run: task lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: 1.23
      - run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
      - run: task setup.test
      - run: task test

  sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: 1.23
      - run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
      - run: task setup.sec
      - run: task sec

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/tf-deploy
        with:
          VULTR_API_TOKEN: ${{ secrets.VULTR_API_TOKEN }}

  docker-build:
    needs:
      - lint
      - test
      - sec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build
        with:
          SERVICE_NAME: test
          DOCKERFILE: ./cmd/data/Dockerfile

  vultr-services:
    needs: [terraform, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/vultr-deploy
        with:
          SERVICE: test
          SERVER_IP: 67.219.103.200
          VULTR_SSH_KEY: ${{ secrets.VULTR_SSH_KEY }}
