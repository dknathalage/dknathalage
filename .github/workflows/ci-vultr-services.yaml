on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  quality-check:
    uses: dknathalage/dknathalage/.github/workflows/ci-quality.yaml@main

  terraform:
    uses: dknathalage/dknathalage/.github/workflows/cd-terraform.yaml@main

  docker-build:
    needs: quality-check
    uses: dknathalage/dknathalage/.github/workflows/ci-docker.yaml@main
    with:
      service: test
      dockerfile: ./cmd/data/Dockerfile

  vultr-services:
    needs: [terraform, docker-build]
    uses: dknathalage/dknathalage/.github/workflows/cd-vultr.yaml@main
    with:
      service: test
      server_ip: 67.219.103.200
