name: Deploy 🚀

on:
  release:
    types: 
      - released
      - prereleased

  workflow_dispatch:

jobs:
  deploy-on-prerelease:
    if: ${{ github.event_name == 'release' && github.event.release.prerelease == true }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying pre-release version ${{ github.event.release.tag_name }}"

  deploy-on-release:
    if: ${{ github.event_name == 'release' && github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying release version ${{ github.event.release.tag_name }}"
