on:
  push:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  quality:
    uses: ./.github/workflows/go-quality.yaml

  build-deploy:
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: invoice
            dockerfile: ./config/docker/invoice.Dockerfile
    uses: ./.github/workflows/cloudrun.yaml
    with:
      service: ${{ matrix.service.name }}
      dockerfile: ${{ matrix.service.dockerfile }}
