version: "3"

tasks:
  test.setup:
    desc: Setup
    cmds:
      - mkdir -p ./tools
      - go install github.com/t-yuki/gocover-cobertura@latest

  test.unit:
    desc: Run unit tests
    cmds:
      - go test ./... -v -race -coverpkg=./... -coverprofile cover.out
      - go tool cover -func cover.out
      - go tool cover -html cover.out -o coverage.html
      - $(go env GOPATH)/bin/gocover-cobertura < cover.out > coverage.xml

  lint.golangci:
    desc: Run golangci-lint
    cmds:
      - $(go env GOPATH)/bin/golangci-lint run --timeout 2m
