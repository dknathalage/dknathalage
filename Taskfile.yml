version: "3"

env:
  TOOLS_DIR: ./bin/tools
  REPORTS_DIR: ./reports
  INFRA_DIR: ./infra

tasks:
  test.setup:
    desc: Setup
    cmds:
      - mkdir -p $TOOLS_DIR
      - for:
          - github.com/mfridman/tparse@latest
          - github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          - github.com/air-verse/air@latest
        cmd: go install {{.ITEM}}
      - for:
          - tparse
          - golangci-lint
          - air
        cmd: mv $(go env GOPATH)/bin/{{.ITEM}} $TOOLS_DIR

  test.unit:
    desc: Run unit tests
    cmds:
      - mkdir -p $REPORTS_DIR
      - go test -coverprofile=$REPORTS_DIR/coverage.txt -json -covermode=atomic ./... > $REPORTS_DIR/test_report.json
      - $TOOLS_DIR/tparse -all -notests -format markdown >> $REPORTS_DIR/test_report.md -file $REPORTS_DIR/test_report.json
    env:
      GOFLAGS: "-v -count=1 -json"

  lint:
    cmds:
      - task: lint.golangci

  lint.golangci:
    desc: Run golangci-lint
    cmds:
      - ./tools/golangci-lint run --timeout 2m

  run.invoice:
    desc: Run invoice service
    cmds:
      - ./tools/air --build.cmd="go build -o ./bin/invoice ./modules/invoice/cmd" --build.bin ./bin/invoice

  tf:
    desc: Run Terraform tasks
    cmds:
      - task: tf.init
      - task: tf.plan
      - task: tf.apply

  tf.init:
    desc: Initialize Terraform
    cmds:
      - terraform -chdir=$INFRA_DIR init

  tf.plan:
    desc: Plan Terraform
    cmds:
      - terraform -chdir=$INFRA_DIR plan -out=../reports/plan.out
      - terraform -chdir=$INFRA_DIR show -json ../reports/plan.out > ./reports/plan.json

  tf.apply:
    desc: Apply Terraform
    cmds:
      - terraform -chdir=$INFRA_DIR apply -auto-approve
