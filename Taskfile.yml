version: "3"

tasks:
  setup:
    cmds:
      - go mod download
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.61.0
      - go install github.com/securego/gosec/v2/cmd/gosec@latest

  lint:
    cmds:
      - echo "RUNNING GOLANGCI-LINT"
      - golangci-lint run

  test:
    cmds:
      - echo "RUNNING TESTS"
      - go test -coverprofile=coverage.out -coverpkg=./pkg ./...
      - go tool cover -func=coverage.out
      # check if the coverage is less than 80%
      - go tool cover -func=coverage.out | grep total | awk '{print $3}' | awk -F. '{print $1}' | awk '{if ($1 < 80) {exit 1}}'

  sec:
    cmds:
      - echo "RUNNING GOSEC"
      - export PATH=$PATH:$(go env GOPATH)/bin
      - $(go env GOPATH)/bin/gosec ./...

  fmt:
    cmds:
      - gofmt -s -w .

  vet:
    cmds:
      - go vet ./...

  quality:
    cmds:
      - task: sec
      - task: lint
      - task: test
      - task: vet
      - task: fmt

  default:
    cmds:
      - task: quality
