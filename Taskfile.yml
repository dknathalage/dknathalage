version: "3"

tasks:
  test.setup:
    desc: Setup
    cmds:
      - mkdir -p ./tools
      - go install github.com/mfridman/tparse@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - mv $(go env GOPATH)/bin/tparse ./tools
      - mv $(go env GOPATH)/bin/golangci-lint ./tools

  test.unit:
    desc: Run unit tests
    cmds:
      - rm -rf ./reports && mkdir -p ./reports
      - go test -coverprofile=./reports/coverage.txt -covermode=atomic ./... | ./tools/tparse -all -notests -format markdown >> ./reports/test_report.md
    env:
      GOFLAGS: "-v -count=1 -json"

  lint.golangci:
    desc: Run golangci-lint
    cmds:
      - ./tools/golangci-lint run --timeout 2m
